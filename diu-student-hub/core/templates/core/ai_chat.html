<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Helper — DIU Student Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Inter', sans-serif; box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f4f6f9; height: 100vh; display: flex; flex-direction: column; }
  .navbar { background: #fff; border-bottom: 1px solid #e8ecf0; padding: 0 32px; height: 64px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .nav-brand { display: flex; align-items: center; gap: 10px; font-size: 17px; font-weight: 700; color: #0f4c2a; text-decoration: none; }
  .nav-logo { width: 36px; height: 36px; background: linear-gradient(135deg, #0f4c2a, #1a7a45); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; }
  .chat-layout { display: flex; flex: 1; overflow: hidden; max-width: 820px; width: 100%; margin: 0 auto; padding: 24px; gap: 20px; }
  .sidebar { width: 220px; flex-shrink: 0; }
  .sidebar-title { font-size: 11px; font-weight: 600; color: #aaa; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }
  .quick-btn { display: block; width: 100%; text-align: left; padding: 10px 14px; background: white; border: 1px solid #e8ecf0; border-radius: 10px; font-size: 13px; color: #444; cursor: pointer; margin-bottom: 8px; transition: all 0.15s; font-family: 'Inter', sans-serif; }
  .quick-btn:hover { border-color: #0f4c2a; color: #0f4c2a; background: #f0faf4; }
  .chat-main { flex: 1; display: flex; flex-direction: column; background: white; border-radius: 16px; border: 1px solid #e8ecf0; overflow: hidden; }
  .chat-header { padding: 16px 20px; border-bottom: 1px solid #e8ecf0; display: flex; align-items: center; gap: 12px; }
  .ai-avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #0f4c2a, #22a05a); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .ai-info h4 { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 2px; }
  .ai-info p { font-size: 12px; color: #22a05a; font-weight: 500; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .msg-row { display: flex; gap: 10px; align-items: flex-end; }
  .msg-row.user { flex-direction: row-reverse; }
  .msg-avatar { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .msg-avatar.ai { background: linear-gradient(135deg, #0f4c2a, #22a05a); }
  .msg-avatar.user { background: #e8ecf0; }
  .msg-bubble { max-width: 75%; padding: 12px 16px; border-radius: 14px; font-size: 14px; line-height: 1.65; word-wrap: break-word; }
  .msg-bubble.ai { background: #f4f6f9; color: #1a1a1a; border-bottom-left-radius: 4px; }
  .msg-bubble.user { background: #0f4c2a; color: white; border-bottom-right-radius: 4px; }
  .msg-bubble.typing { color: #aaa; font-style: italic; }
  .chat-input-area { padding: 16px 20px; border-top: 1px solid #e8ecf0; display: flex; gap: 10px; }
  .chat-input-area input { flex: 1; padding: 12px 16px; border: 1.5px solid #e8ecf0; border-radius: 10px; font-size: 14px; outline: none; font-family: 'Inter', sans-serif; transition: border-color 0.15s; }
  .chat-input-area input:focus { border-color: #0f4c2a; }
  .send-btn { padding: 12px 20px; background: #0f4c2a; color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s; white-space: nowrap; }
  .send-btn:hover { background: #0a3a20; }
</style>
</head>
<body>
<nav class="navbar">
  <a href="{% url 'home' %}" class="nav-brand"><div class="nav-logo">🎓</div>DIU Student Hub</a>
  <span style="font-size:13px;color:#888;">AI Powered by Gemini</span>
</nav>

<div class="chat-layout">
  <div class="sidebar">
    <div class="sidebar-title">দ্রুত প্রশ্ন</div>
    <button class="quick-btn" onclick="sendQuick('প্রথম দিন DIU তে কী করবো?')">🎯 প্রথম দিনের গাইড</button>
    <button class="quick-btn" onclick="sendQuick('ক্লাস রুটিন কোথায় পাবো?')">📅 ক্লাস রুটিন</button>
    <button class="quick-btn" onclick="sendQuick('CGPA কীভাবে হিসাব হয়?')">📊 CGPA হিসাব</button>
    <button class="quick-btn" onclick="sendQuick('Library কখন খোলে?')">📚 Library timing</button>
    <button class="quick-btn" onclick="sendQuick('Portal এ login করবো কীভাবে?')">🔑 Portal login</button>
    <button class="quick-btn" onclick="sendQuick('Semester fee কত দিতে হয়?')">💰 Semester fee</button>
    <button class="quick-btn" onclick="sendQuick('Campus এ কোথায় কী আছে?')">🗺 Campus guide</button>
  </div>

  <div class="chat-main">
    <div class="chat-header">
      <div class="ai-avatar">🤖</div>
      <div class="ai-info">
        <h4>DIU AI Assistant</h4>
        <p>● Online — সব প্রশ্নের উত্তর দিতে রেডি</p>
      </div>
    </div>
    <div class="chat-messages" id="chat-box">
      <div class="msg-row">
        <div class="msg-avatar ai">🤖</div>
        <div class="msg-bubble ai">হ্যালো! আমি DIU AI Assistant। তুমি DIU সম্পর্কে যা জানতে চাও জিজ্ঞেস করো — ক্লাস রুটিন, CGPA, campus, fees, যেকোনো কিছু! 😊</div>
      </div>
    </div>
    <div class="chat-input-area">
      <input type="text" id="chat-input" placeholder="যেকোনো প্রশ্ন করো..." onkeydown="if(event.key==='Enter') sendMsg()">
      <button class="send-btn" onclick="sendMsg()">পাঠাও →</button>
    </div>
  </div>
</div>

<script>
let history = [];
function sendMsg() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  appendMsg(msg, 'user');
  history.push({ role: 'user', content: msg });
  input.value = '';
  const typing = appendMsg('লিখছি...', 'typing');
  fetch("{% url 'ai_chat_api' %}", {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: msg, history: history })
  })
  .then(r => r.json())
  .then(data => {
    typing.remove();
    const reply = data.reply || 'Sorry, উত্তর পাইনি।';
    appendMsg(reply, 'ai');
    history.push({ role: 'model', content: reply });
  })
  .catch(() => { typing.remove(); appendMsg('Error হয়েছে, আবার চেষ্টা করো।', 'ai'); });
}
function sendQuick(q) { document.getElementById('chat-input').value = q; sendMsg(); }
function appendMsg(text, role) {
  const box = document.getElementById('chat-box');
  const row = document.createElement('div');
  row.className = 'msg-row' + (role === 'user' ? ' user' : '');
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar ' + (role === 'user' ? 'user' : 'ai');
  avatar.textContent = role === 'user' ? '👤' : '🤖';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble ' + (role === 'typing' ? 'ai typing' : role);
  bubble.textContent = text;
  if (role === 'user') { row.appendChild(bubble); row.appendChild(avatar); }
  else { row.appendChild(avatar); row.appendChild(bubble); }
  box.appendChild(row);
  box.scrollTop = box.scrollHeight;
  return bubble;
}
</script>
</body>
</html>
