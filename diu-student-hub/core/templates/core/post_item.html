<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>পোস্ট করো — DIU Student Hub</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Inter', sans-serif; }
  body { background: #f4f6f9; }
  .navbar { background: #fff; border-bottom: 1px solid #e8ecf0; padding: 0 32px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
  .nav-brand { display: flex; align-items: center; gap: 10px; font-size: 17px; font-weight: 700; color: #0f4c2a; text-decoration: none; }
  .nav-logo { width: 36px; height: 36px; background: linear-gradient(135deg, #0f4c2a, #1a7a45); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; }
  .form-wrap { max-width: 600px; margin: 40px auto; padding: 0 20px; }
  .form-card { background: white; border-radius: 16px; border: 1px solid #e8ecf0; padding: 36px; }
  .form-title { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
  .form-sub { font-size: 14px; color: #888; margin-bottom: 28px; }
  .form-label { font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
  .form-control { border: 1px solid #e8ecf0; border-radius: 10px; padding: 11px 14px; font-size: 14px; transition: border-color 0.15s; }
  .form-control:focus { border-color: #0f4c2a; box-shadow: 0 0 0 3px rgba(15,76,42,0.1); }
  .toggle-group { display: flex; gap: 12px; }
  .toggle-btn { flex: 1; padding: 12px; border-radius: 10px; border: 1.5px solid #e8ecf0; background: white; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; color: #555; }
  .toggle-btn.active-lost { border-color: #991b1b; background: #fef2f2; color: #991b1b; }
  .toggle-btn.active-found { border-color: #166534; background: #f0fdf4; color: #166534; }
  .submit-btn { width: 100%; padding: 13px; background: #0f4c2a; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s; margin-top: 8px; }
  .submit-btn:hover { background: #0a3a20; }
  .upload-area { border: 2px dashed #e8ecf0; border-radius: 10px; padding: 24px; text-align: center; cursor: pointer; transition: border-color 0.15s; }
  .upload-area:hover { border-color: #0f4c2a; }
  .upload-area p { font-size: 13px; color: #888; margin: 8px 0 0; }
</style>
</head>
<body>
<nav class="navbar">
  <a href="{% url 'home' %}" class="nav-brand"><div class="nav-logo">🎓</div>DIU Student Hub</a>
  <a href="{% url 'lost_found' %}" style="font-size:14px;color:#888;text-decoration:none;">← ফিরে যাও</a>
</nav>

<div class="form-wrap">
  <div class="form-card">
    <div class="form-title">নতুন পোস্ট করো</div>
    <div class="form-sub">হারানো বা পাওয়া জিনিসের তথ্য দাও</div>

    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <input type="hidden" name="is_found" id="is_found_val" value="">

      <div class="mb-3">
        <label class="form-label">এটা কি?</label>
        <div class="toggle-group">
          <button type="button" class="toggle-btn active-lost" id="btn-lost" onclick="setType('lost')">😟 হারিয়ে গেছে</button>
          <button type="button" class="toggle-btn" id="btn-found" onclick="setType('found')">😊 পাওয়া গেছে</button>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">জিনিসের নাম *</label>
        <input type="text" name="title" class="form-control" placeholder="যেমন: নীল রঙের ব্যাগ, Samsung মোবাইল" required>
      </div>
      <div class="mb-3">
        <label class="form-label">বিস্তারিত বিবরণ *</label>
        <textarea name="description" class="form-control" rows="3" placeholder="জিনিসটা কেমন দেখতে? কোনো বিশেষ চিহ্ন আছে?" required></textarea>
      </div>
      <div class="mb-3">
        <label class="form-label">কোথায়? *</label>
        <input type="text" name="location" class="form-control" placeholder="যেমন: AB Building 3rd floor, Library, Cafeteria" required>
      </div>
      <div class="mb-3">
        <label class="form-label">যোগাযোগ</label>
        <input type="text" name="contact" class="form-control" placeholder="ফোন নম্বর বা Facebook ID (ঐচ্ছিক)">
      </div>
      <div class="mb-4">
        <label class="form-label">ছবি (থাকলে ভালো)</label>
        <label class="upload-area" for="img-input">
          <div style="font-size:28px;">📷</div>
          <p>ক্লিক করে ছবি বেছে নাও</p>
          <input type="file" id="img-input" name="image" accept="image/*" style="display:none" onchange="showFileName(this)">
          <p id="file-name" style="color:#0f4c2a;font-weight:500;"></p>
        </label>
      </div>
      <button type="submit" class="submit-btn">পোস্ট করো →</button>
    </form>
  </div>
</div>

<script>
function setType(type) {
  document.getElementById('is_found_val').value = type === 'found' ? 'on' : '';
  document.getElementById('btn-lost').className = 'toggle-btn' + (type === 'lost' ? ' active-lost' : '');
  document.getElementById('btn-found').className = 'toggle-btn' + (type === 'found' ? ' active-found' : '');
}
function showFileName(input) {
  if(input.files[0]) document.getElementById('file-name').textContent = input.files[0].name;
}
setType('lost');
</script>
</body>
</html>
